<template id="transitions-scene-template">
  <div
    data-composition-id="transitions-scene"
    data-start="0"
    data-duration="26"
    data-width="1920"
    data-height="1080"
  >
    <div class="wipe-band"></div>
    <div class="wipe-band secondary"></div>
    <div class="wipe-line"></div>
    <style>
      [data-composition-id="transitions-scene"] {
        position: relative;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      [data-composition-id="transitions-scene"] .wipe-band,
      [data-composition-id="transitions-scene"] .wipe-band.secondary {
        position: absolute;
        top: -10%;
        left: -10%;
        width: 130%;
        height: 120%;
        transform: skewX(-18deg) scaleX(0);
        transform-origin: left center;
      }

      [data-composition-id="transitions-scene"] .wipe-band {
        background: linear-gradient(90deg, rgba(101, 231, 255, 0.95), rgba(8, 17, 29, 0.96));
      }

      [data-composition-id="transitions-scene"] .wipe-band.secondary {
        background: linear-gradient(90deg, rgba(212, 255, 63, 0.95), rgba(8, 17, 29, 0.96));
        mix-blend-mode: screen;
        opacity: 0.55;
      }

      [data-composition-id="transitions-scene"] .wipe-line {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 3px;
        background: rgba(237, 243, 251, 0.9);
        box-shadow: 0 0 30px rgba(237, 243, 251, 0.45);
        opacity: 0;
      }
    </style>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const addTransition = (start, hue) => {
        tl.set(".wipe-band", { background: hue.primary, transformOrigin: "left center" }, start);
        tl.set(".wipe-band.secondary", { background: hue.secondary, transformOrigin: "left center" }, start);
        tl.set([".wipe-band", ".wipe-band.secondary"], { scaleX: 0, opacity: 1 }, start);
        tl.set(".wipe-line", { x: -200, opacity: 0 }, start);
        tl.to(".wipe-band", { scaleX: 1, duration: 0.34, ease: "power4.in" }, start);
        tl.to(".wipe-band.secondary", { scaleX: 1, duration: 0.42, ease: "expo.in" }, start + 0.04);
        tl.to(".wipe-line", { x: 2200, duration: 0.38, ease: "none" }, start);
        tl.to(".wipe-line", { opacity: 1, duration: 0.02, ease: "none" }, start);
        tl.to(
          ".wipe-band",
          { scaleX: 0, duration: 0.36, ease: "power3.out", overwrite: "auto", transformOrigin: "right center" },
          start + 0.34,
        );
        tl.to(
          ".wipe-band.secondary",
          { scaleX: 0, duration: 0.42, ease: "expo.out", overwrite: "auto", transformOrigin: "right center" },
          start + 0.38,
        );
        tl.to(".wipe-line", { opacity: 0, duration: 0.08, ease: "none", overwrite: "auto" }, start + 0.58);
      };

      addTransition(3.68, {
        primary: "linear-gradient(90deg, rgba(101, 231, 255, 0.98), rgba(8, 17, 29, 0.96))",
        secondary: "linear-gradient(90deg, rgba(212, 255, 63, 0.85), rgba(8, 17, 29, 0.92))",
      });
      addTransition(7.68, {
        primary: "linear-gradient(90deg, rgba(212, 255, 63, 0.98), rgba(8, 17, 29, 0.96))",
        secondary: "linear-gradient(90deg, rgba(101, 231, 255, 0.8), rgba(8, 17, 29, 0.92))",
      });
      addTransition(11.88, {
        primary: "linear-gradient(90deg, rgba(101, 231, 255, 0.98), rgba(8, 17, 29, 0.96))",
        secondary: "linear-gradient(90deg, rgba(212, 255, 63, 0.85), rgba(8, 17, 29, 0.92))",
      });
      addTransition(16.78, {
        primary: "linear-gradient(90deg, rgba(212, 255, 63, 0.98), rgba(8, 17, 29, 0.96))",
        secondary: "linear-gradient(90deg, rgba(101, 231, 255, 0.8), rgba(8, 17, 29, 0.92))",
      });
      addTransition(20.88, {
        primary: "linear-gradient(90deg, rgba(101, 231, 255, 0.98), rgba(8, 17, 29, 0.96))",
        secondary: "linear-gradient(90deg, rgba(212, 255, 63, 0.85), rgba(8, 17, 29, 0.92))",
      });

      window.__timelines["transitions-scene"] = tl;
    </script>
  </div>
</template>
