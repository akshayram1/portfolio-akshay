<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Akshay Chame | HyperFrames Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #06101b;
        color: #edf3fb;
        font-family: "Space Grotesk", sans-serif;
      }

      #root {
        position: relative;
        width: 100%;
        height: 100%;
        background: #06101b;
      }

      .scene-layer {
        position: absolute;
        inset: 0;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="26"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="scene-shell"
        class="clip scene-layer"
        data-composition-id="shell-scene"
        data-composition-src="compositions/shell.html"
        data-start="0"
        data-duration="26"
        data-track-index="0"
      ></div>

      <div
        id="scene-hero"
        class="clip scene-layer"
        data-composition-id="hero-scene"
        data-composition-src="compositions/hero.html"
        data-start="0"
        data-duration="4.3"
        data-track-index="1"
      ></div>

      <div
        id="scene-impact"
        class="clip scene-layer"
        data-composition-id="impact-scene"
        data-composition-src="compositions/impact.html"
        data-start="3.8"
        data-duration="4.6"
        data-track-index="2"
      ></div>

      <div
        id="scene-experience"
        class="clip scene-layer"
        data-composition-id="experience-scene"
        data-composition-src="compositions/experience.html"
        data-start="7.8"
        data-duration="4.8"
        data-track-index="3"
      ></div>

      <div
        id="scene-projects"
        class="clip scene-layer"
        data-composition-id="projects-scene"
        data-composition-src="compositions/projects.html"
        data-start="12.0"
        data-duration="5.2"
        data-track-index="4"
      ></div>

      <div
        id="scene-credentials"
        class="clip scene-layer"
        data-composition-id="credentials-scene"
        data-composition-src="compositions/credentials.html"
        data-start="16.9"
        data-duration="4.6"
        data-track-index="5"
      ></div>

      <div
        id="scene-contact"
        class="clip scene-layer"
        data-composition-id="contact-scene"
        data-composition-src="compositions/contact.html"
        data-start="21.0"
        data-duration="5.0"
        data-track-index="6"
      ></div>

      <div
        id="scene-transitions"
        class="clip scene-layer"
        data-composition-id="transitions-scene"
        data-composition-src="compositions/transitions.html"
        data-start="0"
        data-duration="26"
        data-track-index="20"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
